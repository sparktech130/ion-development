networks:
  docs_net:
    name: iondocs_net
    driver: bridge

services:
  swagger-ui:
    image: ionsmart-api-docs:latest
    container_name: ionsmart-api-docs
    ports:
      - "9080:8080"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:8080",
        ]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - docs_net
