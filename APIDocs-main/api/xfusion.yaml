openapi: 3.0.0
info:
  title: ION XFUSION – API
  version: 1.0.0
  description: Todos los endpoints aceptan `application/json` en el cuerpo y responden JSON.

servers:
  - url: https://10.10.1.220/core/XFUSION-API
    description: Servidor base bossauto

  - url: https://ionsmartest.eu/core/XFUSION-API
    description: Servidor base

  - url: https://localhost:8101/core/XFUSION-API
