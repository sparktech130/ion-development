  /estadisticas/obtener:
    $ref: "paths/xfusion/stats.yaml#/components/x-routes/Obtener"

components:
  securitySchemes:
    bearerAuth:
      $ref: "utils/fields.yaml#/components/securitySchemes/bearerAuth"
    userAndPassword:
      $ref: "utils/fields.yaml#/components/securitySchemes/userAndPassword"
