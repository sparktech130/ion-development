    ObtenerReconocimientosGridRequest:
      type: object
      properties:
        modulos:
          $ref: "../../utils/fields.yaml#/components/schemas/Modulos"

    # ========= MARCAR =========
    MarcarReconocimientoRequest:
      type: object
      required:
        - cod_reconoc
      properties:
        cod_reconoc:
          $ref: "../../utils/fields.yaml#/components/schemas/CodReconoc"

    MarcarReconocimientoResponse:
      type: object
      additionalProperties: false
      properties:
        success:
          type: boolean
          description: Indica si la operación se realizó correctamente
        action:
          type: string
          enum: ["mark", "unmark"]
          description: Indica la acción realizada
      example:
        success: true
        action: "mark"

    # ========= Observaciones =========
    ModificarObservacionesReconocimientoRequest:
      type: object
      required:
        - cod_reconoc
        - observaciones
      properties:
        cod_reconoc:
          $ref: "../../utils/fields.yaml#/components/schemas/CodReconoc"
        observaciones:
          type: string

  x-routes:
    Obtener:
      post:
        tags: [Reconocimientos]
        summary: Obtener
        description: Devuelve datos de reconocimientos
        operationId: obtenerReconocimientos
        security: [{ bearerAuth: [] }]
        requestBody:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ObtenerReconocimientosRequest"

        responses:
          "200":
            description: OK
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/ObtenerReconocimientosResponse"
          "401":
            description: Usuario inválido o no autorizado
            content:
              application/json:
                schema:
                  $ref: "../../utils/responses.yaml#/components/schemas/ErrorDefault"
          "498":
            description: Token expirado o inválido,
