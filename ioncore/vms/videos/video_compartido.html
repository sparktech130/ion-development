<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Te han compartido un video</title>
</head>

<body style="
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    ">
    <table width="100%" cellpadding="0" cellspacing="0" border="0"
        style="background-color: #f4f4f4; margin: 0; padding: 0">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" border="0" style="
              background-color: #ffffff;
              box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
              margin: 7.5vh auto 5.5vh auto;
              padding: 20px;
              border-radius: 8px;
            ">
                    <tr>
                        <td align="center" style="padding: 10px 0">
                            <h1 style="margin: 0; color: #333333">
                                Te han compartido un video
                            </h1>
                        </td>
                    </tr>
                    <tr>
                        <td align="left" style="
                  margin: 20px 0;
                  line-height: 1.6;
                  color: #666666;
                  padding: 0 20px;
                ">
                            <p style="margin: 10px 0">Hola [Nombre del Compartido],</p>
                            <p style="margin: 10px 0">
                                [Nombre del Usuario Inicial] te ha compartido un video
                            </p>
                            <br/>
                            <p style="margin: 10px 0">Detalles del video:</p>
                            <ul class="details_list" style="list-style: none; padding: 0; margin: 10px 0">
                                <li style="margin: 10px 0">
                                    <table cellpadding="0" cellspacing="0" border="0">
                                        <tr>
                                            <td><strong>Título:</strong> [Titulo del Video]</td>
                                        </tr>
                                    </table>
                                </li>
                                <li style="margin: 10px 0">
                                    <table cellpadding="0" cellspacing="0" border="0">
                                        <tr>
                                            <td><strong>Dispositivo:</strong> [Nombre del Dispositivo]</td>
                                        </tr>
                                    </table>
                                </li>
                            </ul>
                        </td>
                    </tr>
                    <tr>
                        <td align="center" style="padding: 30px 0">
                            [Boton Descarga]
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>

</html>
